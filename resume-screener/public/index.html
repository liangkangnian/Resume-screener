<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 简历筛选助手</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-primary: #0a0e17;
      --bg-secondary: #111827;
      --bg-card: #1a2236;
      --bg-card-hover: #1f2a42;
      --border: #2a3554;
      --border-light: #374264;
      --text-primary: #e8ecf4;
      --text-secondary: #8892a8;
      --text-muted: #5a6580;
      --accent: #3b82f6;
      --accent-glow: rgba(59, 130, 246, 0.15);
      --green: #10b981;
      --green-bg: rgba(16, 185, 129, 0.1);
      --yellow: #f59e0b;
      --yellow-bg: rgba(245, 158, 11, 0.1);
      --red: #ef4444;
      --red-bg: rgba(239, 68, 68, 0.1);
      --radius: 12px;
      --shadow: 0 4px 24px rgba(0,0,0,0.3);
    }

    body {
      font-family: 'Noto Sans SC', -apple-system, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.6;
    }

    .header {
      background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-card) 100%);
      border-bottom: 1px solid var(--border);
      padding: 20px 0;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
    }

    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 32px;
      display: flex;
      align-items: center;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo-icon {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, var(--accent) 0%, #8b5cf6 100%);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .logo h1 {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.5px;
    }

    .logo h1 span { color: var(--accent); }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px;
    }

    .main-grid {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 28px;
      align-items: start;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow);
    }

    .card-title {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-primary);
    }

    .card-title .icon { font-size: 18px; }

    .criteria-section { position: sticky; top: 88px; }

    .criteria-textarea {
      width: 100%;
      min-height: 220px;
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-size: 14px;
      font-family: 'Noto Sans SC', sans-serif;
      line-height: 1.8;
      resize: vertical;
      transition: border-color 0.2s;
    }

    .criteria-textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .criteria-textarea::placeholder { color: var(--text-muted); }

    .criteria-hint {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 10px;
      line-height: 1.6;
    }

    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 40px 24px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      background: transparent;
      position: relative;
    }

    .upload-zone:hover, .upload-zone.dragover {
      border-color: var(--accent);
      background: var(--accent-glow);
    }

    .upload-zone .upload-icon {
      font-size: 40px;
      margin-bottom: 12px;
      display: block;
    }

    .upload-zone p { color: var(--text-secondary); font-size: 14px; }
    .upload-zone .hint { font-size: 12px; color: var(--text-muted); margin-top: 6px; }

    .upload-zone input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .file-list {
      margin-top: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .file-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .file-item .file-icon { font-size: 16px; }

    .file-item .file-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--text-secondary);
    }

    .file-item .file-size {
      font-size: 12px;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
    }

    .file-item .remove-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 16px;
      padding: 2px 6px;
      border-radius: 4px;
      transition: all 0.2s;
    }

    .file-item .remove-btn:hover {
      color: var(--red);
      background: var(--red-bg);
    }

    .btn-primary {
      width: 100%;
      padding: 14px 24px;
      background: linear-gradient(135deg, var(--accent) 0%, #2563eb 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      font-family: 'Noto Sans SC', sans-serif;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 20px;
      letter-spacing: 0.5px;
    }

    .btn-primary:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(59, 130, 246, 0.35);
    }

    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .progress-bar {
      width: 100%;
      height: 4px;
      background: var(--bg-primary);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 16px;
      display: none;
    }

    .progress-bar.active { display: block; }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #8b5cf6);
      border-radius: 2px;
      transition: width 0.3s;
      width: 0%;
    }

    .progress-text {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 8px;
      text-align: center;
      display: none;
    }

    .progress-text.active { display: block; }

    .results-section { display: none; }
    .results-section.active { display: block; }

    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .results-stats { display: flex; gap: 16px; }

    .stat-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
    }

    .stat-badge.green { background: var(--green-bg); color: var(--green); }
    .stat-badge.yellow { background: var(--yellow-bg); color: var(--yellow); }
    .stat-badge.red { background: var(--red-bg); color: var(--red); }

    .result-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 16px;
      overflow: hidden;
      transition: all 0.3s;
      animation: slideUp 0.4s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .result-card:hover {
      border-color: var(--border-light);
      box-shadow: var(--shadow);
    }

    .result-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 22px;
      cursor: pointer;
      user-select: none;
    }

    .result-card-header:hover { background: var(--bg-card-hover); }

    .result-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .score-circle {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      flex-shrink: 0;
    }

    .score-circle.high { background: var(--green-bg); color: var(--green); border: 2px solid var(--green); }
    .score-circle.mid { background: var(--yellow-bg); color: var(--yellow); border: 2px solid var(--yellow); }
    .score-circle.low { background: var(--red-bg); color: var(--red); border: 2px solid var(--red); }

    .candidate-info h3 { font-size: 16px; font-weight: 600; margin-bottom: 3px; }

    .candidate-info .file-tag {
      font-size: 12px;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
    }

    .result-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .rec-badge {
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
    }

    .rec-badge.推荐 { background: var(--green-bg); color: var(--green); }
    .rec-badge.待定 { background: var(--yellow-bg); color: var(--yellow); }
    .rec-badge.不推荐 { background: var(--red-bg); color: var(--red); }

    .expand-arrow {
      color: var(--text-muted);
      transition: transform 0.3s;
      font-size: 18px;
    }

    .result-card.expanded .expand-arrow { transform: rotate(180deg); }

    .result-detail {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s ease;
    }

    .result-card.expanded .result-detail { max-height: 800px; }

    .result-detail-inner {
      padding: 0 22px 22px;
      border-top: 1px solid var(--border);
    }

    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 16px;
    }

    .detail-block h4 {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .detail-block ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .detail-block li {
      font-size: 13px;
      color: var(--text-secondary);
      padding-left: 16px;
      position: relative;
    }

    .detail-block li::before {
      content: '';
      position: absolute;
      left: 0;
      top: 8px;
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }

    .detail-block.matched li::before { background: var(--green); }
    .detail-block.missing li::before { background: var(--red); }
    .detail-block.highlights li::before { background: var(--accent); }
    .detail-block.concerns li::before { background: var(--yellow); }

    .summary-block {
      margin-top: 16px;
      padding: 14px 18px;
      background: var(--bg-primary);
      border-radius: 8px;
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.7;
      border-left: 3px solid var(--accent);
    }

    .empty-state {
      text-align: center;
      padding: 60px 24px;
      color: var(--text-muted);
    }

    .empty-state .empty-icon { font-size: 48px; margin-bottom: 16px; display: block; }
    .empty-state p { font-size: 14px; }

    .btn-export {
      padding: 8px 18px;
      background: var(--green-bg);
      color: var(--green);
      border: 1px solid rgba(16, 185, 129, 0.3);
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      font-family: 'Noto Sans SC', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-export:hover { background: rgba(16, 185, 129, 0.2); }

    @media (max-width: 900px) {
      .main-grid { grid-template-columns: 1fr; }
      .criteria-section { position: static; }
      .detail-grid { grid-template-columns: 1fr; }
    }

    .toast {
      position: fixed;
      bottom: 30px;
      right: 30px;
      padding: 14px 22px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      color: var(--text-primary);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      z-index: 1000;
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.3s;
    }

    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.error { border-left: 3px solid var(--red); }
    .toast.success { border-left: 3px solid var(--green); }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border-light); }
  </style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">📋</div>
      <h1>AI 简历<span>筛选助手</span></h1>
    </div>
  </div>
</header>

<div class="container">
  <div class="main-grid">
    <div class="left-col">
      <div class="card criteria-section">
        <div class="card-title">
          <span class="icon">🎯</span> 筛选条件
        </div>
        <textarea class="criteria-textarea" id="criteriaInput"
                  placeholder="请输入你的筛选条件，例如：&#10;&#10;1. 3年以上电商运营经验&#10;2. 熟悉 Shopee / Lazada / Amazon 平台&#10;3. 英语能沟通&#10;4. 有团队管理经验优先&#10;5. 本科及以上学历"></textarea>
        <p class="criteria-hint">
          💡 条件写得越清晰，AI 筛选越精准。可以写硬性要求和加分项。
        </p>

        <div style="margin-top: 20px;">
          <div class="card-title">
            <span class="icon">📄</span> 上传简历
          </div>
          <div class="upload-zone" id="uploadZone">
            <input type="file" id="fileInput" multiple accept=".pdf" />
            <span class="upload-icon">📤</span>
            <p>拖拽 PDF 文件到这里，或点击选择</p>
            <p class="hint">支持批量上传多份 PDF 简历</p>
          </div>
          <div class="file-list" id="fileList"></div>
        </div>

        <button class="btn-primary" id="startBtn" disabled>
          🚀 开始 AI 筛选
        </button>
        <div class="progress-bar" id="progressBar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <p class="progress-text" id="progressText"></p>
      </div>
    </div>

    <div class="right-col">
      <div class="empty-state" id="emptyState">
        <span class="empty-icon">🔍</span>
        <p>上传简历并设置筛选条件后<br/>点击"开始 AI 筛选"查看结果</p>
      </div>

      <div class="results-section" id="resultsSection">
        <div class="results-header">
          <div class="results-stats" id="resultsStats"></div>
          <button class="btn-export" id="exportBtn" onclick="exportCSV()">
            📊 导出 CSV
          </button>
        </div>
        <div id="resultsContainer"></div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  let uploadedFiles = [];
  let results = [];

  const criteriaInput = document.getElementById('criteriaInput');
  const fileInput = document.getElementById('fileInput');
  const uploadZone = document.getElementById('uploadZone');
  const fileList = document.getElementById('fileList');
  const startBtn = document.getElementById('startBtn');
  const progressBar = document.getElementById('progressBar');
  const progressFill = document.getElementById('progressFill');
  const progressText = document.getElementById('progressText');
  const emptyState = document.getElementById('emptyState');
  const resultsSection = document.getElementById('resultsSection');
  const resultsContainer = document.getElementById('resultsContainer');
  const resultsStats = document.getElementById('resultsStats');

  // Load saved criteria
  criteriaInput.value = localStorage.getItem('screening_criteria') || '';
  criteriaInput.addEventListener('input', () => {
    localStorage.setItem('screening_criteria', criteriaInput.value);
    checkReady();
  });

  // Drag & Drop
  uploadZone.addEventListener('dragover', (e) => {
    e.preventDefault();
    uploadZone.classList.add('dragover');
  });
  uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
  uploadZone.addEventListener('drop', (e) => {
    e.preventDefault();
    uploadZone.classList.remove('dragover');
    handleFiles(e.dataTransfer.files);
  });

  fileInput.addEventListener('change', (e) => {
    handleFiles(e.target.files);
    fileInput.value = '';
  });

  function handleFiles(fileListObj) {
    for (const file of fileListObj) {
      if (file.type !== 'application/pdf') {
        showToast('只支持 PDF 文件: ' + file.name, 'error');
        continue;
      }
      if (uploadedFiles.some(f => f.name === file.name)) {
        showToast('文件已存在: ' + file.name, 'error');
        continue;
      }
      uploadedFiles.push(file);
    }
    renderFileList();
    checkReady();
  }

  function renderFileList() {
    fileList.innerHTML = uploadedFiles.map((file, i) => `
      <div class="file-item">
        <span class="file-icon">📄</span>
        <span class="file-name">${file.name}</span>
        <span class="file-size">${(file.size / 1024).toFixed(0)} KB</span>
        <button class="remove-btn" onclick="removeFile(${i})">✕</button>
      </div>
    `).join('');
  }

  function removeFile(index) {
    uploadedFiles.splice(index, 1);
    renderFileList();
    checkReady();
  }

  function checkReady() {
    const hasCriteria = criteriaInput.value.trim().length > 0;
    const hasFiles = uploadedFiles.length > 0;
    startBtn.disabled = !(hasCriteria && hasFiles);
  }

  async function extractPDFText(file) {
    const arrayBuffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
    let text = '';
    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      text += content.items.map(item => item.str).join(' ') + '\n';
    }
    return text.trim();
  }

  startBtn.addEventListener('click', startScreening);

  async function startScreening() {
    const criteria = criteriaInput.value.trim();
    if (!criteria || uploadedFiles.length === 0) return;

    results = [];
    startBtn.disabled = true;
    startBtn.textContent = '⏳ 筛选中...';
    progressBar.classList.add('active');
    progressText.classList.add('active');
    emptyState.style.display = 'none';
    resultsSection.classList.add('active');
    resultsContainer.innerHTML = '';

    const total = uploadedFiles.length;

    for (let i = 0; i < total; i++) {
      const file = uploadedFiles[i];
      progressFill.style.width = `${((i) / total) * 100}%`;
      progressText.textContent = `正在分析 ${i + 1}/${total}：${file.name}`;

      try {
        const resumeText = await extractPDFText(file);

        if (!resumeText || resumeText.length < 20) {
          results.push({
            fileName: file.name,
            result: {
              name: '无法读取',
              score: 0,
              recommendation: '待定',
              matchedCriteria: [],
              missingCriteria: [],
              highlights: [],
              concerns: ['PDF 文本提取失败，可能是扫描件或图片格式'],
              summary: '无法提取简历文本内容，建议人工查看。'
            }
          });
          renderResults();
          continue;
        }

        const response = await fetch('/api/screen', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ resumeText, criteria, fileName: file.name }),
        });

        const data = await response.json();

        if (data.success) {
          results.push({ fileName: file.name, result: data.result });
        } else {
          results.push({
            fileName: file.name,
            result: {
              name: '分析失败',
              score: 0,
              recommendation: '待定',
              matchedCriteria: [],
              missingCriteria: [],
              highlights: [],
              concerns: [data.error || 'API 调用失败'],
              summary: data.error || '分析过程中出现错误'
            }
          });
        }
      } catch (err) {
        results.push({
          fileName: file.name,
          result: {
            name: '错误',
            score: 0,
            recommendation: '待定',
            matchedCriteria: [],
            missingCriteria: [],
            highlights: [],
            concerns: [err.message],
            summary: '处理过程中出错：' + err.message
          }
        });
      }

      renderResults();
    }

    progressFill.style.width = '100%';
    progressText.textContent = `✅ 全部完成！共筛选 ${total} 份简历`;
    startBtn.textContent = '🚀 重新筛选';
    startBtn.disabled = false;
    showToast(`筛选完成！共 ${total} 份简历`, 'success');
  }

  function renderResults() {
    const sorted = [...results].sort((a, b) => (b.result.score || 0) - (a.result.score || 0));

    const recommended = sorted.filter(r => r.result.recommendation === '推荐').length;
    const pending = sorted.filter(r => r.result.recommendation === '待定').length;
    const rejected = sorted.filter(r => r.result.recommendation === '不推荐').length;

    resultsStats.innerHTML = `
      <span class="stat-badge green">✓ 推荐 ${recommended}</span>
      <span class="stat-badge yellow">◐ 待定 ${pending}</span>
      <span class="stat-badge red">✕ 不推荐 ${rejected}</span>
    `;

    resultsContainer.innerHTML = sorted.map((item, i) => {
      const r = item.result;
      const scoreClass = r.score >= 70 ? 'high' : r.score >= 50 ? 'mid' : 'low';

      return `
        <div class="result-card" id="card-${i}">
          <div class="result-card-header" onclick="toggleCard(${i})">
            <div class="result-left">
              <div class="score-circle ${scoreClass}">${r.score}</div>
              <div class="candidate-info">
                <h3>${r.name || '未知'}</h3>
                <span class="file-tag">${item.fileName}</span>
              </div>
            </div>
            <div class="result-right">
              <span class="rec-badge ${r.recommendation}">${r.recommendation}</span>
              <span class="expand-arrow">▾</span>
            </div>
          </div>
          <div class="result-detail">
            <div class="result-detail-inner">
              <div class="detail-grid">
                ${r.matchedCriteria?.length ? `
                  <div class="detail-block matched">
                    <h4>✅ 匹配条件</h4>
                    <ul>${r.matchedCriteria.map(c => `<li>${c}</li>`).join('')}</ul>
                  </div>` : ''}
                ${r.missingCriteria?.length ? `
                  <div class="detail-block missing">
                    <h4>❌ 不满足</h4>
                    <ul>${r.missingCriteria.map(c => `<li>${c}</li>`).join('')}</ul>
                  </div>` : ''}
                ${r.highlights?.length ? `
                  <div class="detail-block highlights">
                    <h4>💡 亮点</h4>
                    <ul>${r.highlights.map(c => `<li>${c}</li>`).join('')}</ul>
                  </div>` : ''}
                ${r.concerns?.length ? `
                  <div class="detail-block concerns">
                    <h4>⚠️ 疑虑</h4>
                    <ul>${r.concerns.map(c => `<li>${c}</li>`).join('')}</ul>
                  </div>` : ''}
              </div>
              <div class="summary-block">
                <strong>总评：</strong>${r.summary}
              </div>
            </div>
          </div>
        </div>
      `;
    }).join('');
  }

  function toggleCard(index) {
    document.getElementById(`card-${index}`).classList.toggle('expanded');
  }

  function exportCSV() {
    if (results.length === 0) return;
    const sorted = [...results].sort((a, b) => (b.result.score || 0) - (a.result.score || 0));
    const headers = ['排名', '姓名', '文件名', '分数', '推荐等级', '匹配条件', '不满足条件', '亮点', '疑虑', '总评'];
    const rows = sorted.map((item, i) => {
      const r = item.result;
      return [
        i + 1, r.name || '', item.fileName, r.score, r.recommendation,
        (r.matchedCriteria || []).join('；'),
        (r.missingCriteria || []).join('；'),
        (r.highlights || []).join('；'),
        (r.concerns || []).join('；'),
        r.summary || ''
      ].map(v => `"${String(v).replace(/"/g, '""')}"`).join(',');
    });

    const BOM = '\uFEFF';
    const csv = BOM + headers.join(',') + '\n' + rows.join('\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `简历筛选结果_${new Date().toISOString().slice(0, 10)}.csv`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('CSV 已导出', 'success');
  }

  function showToast(message, type = 'success') {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.className = `toast ${type} show`;
    setTimeout(() => toast.classList.remove('show'), 3000);
  }

  checkReady();
</script>
</body>
</html>
